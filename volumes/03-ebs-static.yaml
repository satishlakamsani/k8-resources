apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi # should be less than or equal to your disk size
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-0b15de3cfac8d6db0

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs-static # This is  the PV name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi